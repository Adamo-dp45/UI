<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: hsl(232, 45%, 90%);
    }

    .wrapper {
        height: 55px;
        width: 320px;
        position: relative;
    }

    .wrapper input {
        height: 100%;
        width: 100%;
        outline: none;
        padding-left: 15px;
        font-size: 18px;
        border: 1px solid #fff;
        border-radius: 5px;
    }

    .wrapper input:valid ~ span {
        display: block;
    }

    .wrapper span {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 18px;
        cursor: pointer;
        color: darkorange;
        display: none;
    }

    /*
        .wrapper span i.hide-btn::before {
            content: "/f070" : / mais l'inverse  
        }
    */
</style>
<body>

    <div class="wrapper">
        <input type="password" class="input" placeholder="Entrer votre mot de passe" required>
        <span class="span">Icon</span>
    </div>

    <script>
        const passField = document.querySelector('.input')
        const btn = document.querySelector('.span') // Si icon (span i)

        btn.onclick = function () {
            if(passField.type === "password") {
                passField.type = "text"
                // btn.classList.add("hide-btn") -- Pour l'icone
            } else {
                passField.type = "password" 
                // btn.classList.remove("hide-btn")
            }
        }
    </script>
</body>
</html>
