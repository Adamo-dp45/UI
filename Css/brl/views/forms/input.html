<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input label</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #191825;
        font-family: Arial, Helvetica, sans-serif;
    }

    .input-check {
        position: relative;
    }

    .input-check input {
        width: 350px;
        height: 60px;
        border-radius: 6px;
        font-size: 18px;
        padding: 0 15px;
        border: 2px solid #FFF;
        background: transparent;
        outline: none;
        color: #FFF;
    }

    .input-check label {
        position: absolute;
        top: 50%;
        left: 15px;
        transform: translateY(-50%);
        color: #FFF;
        font-size: 19px;
        pointer-events: none;
        transition: .3s;
    }

    .input-check input:focus {
        border: 2px solid #1cd679;
    }

    .input-check input:focus ~ label,
    .input-check input:valid ~ label {
        top: 0;
        font-size: 16px;
        padding: 0 10px;
        background: #191825;
    }
</style>
<body>

    <div class="input-check">
        <input type="text" required spellcheck="false" name="" id="">
        <label for="">Entrer votre nom</label>
    </div>

</body>
</html>
