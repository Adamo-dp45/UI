
<style>
:root {
  --background: oklch(1.0000 0 0);
  --foreground: oklch(0.2686 0 0);
  --primary: oklch(0.7686 0.1647 70.0804);
  --primary-foreground: oklch(0 0 0);
  --secondary: oklch(0.9670 0.0029 264.5419);
  --muted: oklch(0.9846 0.0017 247.8389);
  --muted-foreground: oklch(0.5510 0.0234 264.3637);
  --accent: oklch(0.9869 0.0214 95.2774);
  --accent-foreground: oklch(0.4732 0.1247 46.2007);
  --border: oklch(0.9276 0.0058 264.5313);
  --ring: oklch(0.7686 0.1647 70.0804);
  --radius: 0.375rem;
}

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes spin-reverse { to { transform: rotate(-360deg); } }
@keyframes pulse-scale { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(.82);opacity:.5} }
@keyframes ripple { 0%{transform:scale(.2);opacity:1} 100%{transform:scale(2);opacity:0} }
@keyframes barWave { 0%,100%{height:10px;opacity:.4} 50%{height:30px;opacity:1} }
@keyframes dots { 0%,80%,100%{transform:scale(0);opacity:.3} 40%{transform:scale(1);opacity:1} }
@keyframes dash { 0%{stroke-dashoffset:113} 50%{stroke-dashoffset:28;transform:rotate(135deg)} 100%{stroke-dashoffset:113;transform:rotate(360deg)} }
@keyframes morph {
  0%,100%{border-radius:50%;transform:rotate(0deg) scale(1)}
  25%{border-radius:30% 70% 70% 30%/30% 30% 70% 70%;transform:rotate(90deg) scale(.9)}
  50%{border-radius:50%;transform:rotate(180deg) scale(1.05)}
  75%{border-radius:70% 30% 30% 70%/70% 70% 30% 30%;transform:rotate(270deg) scale(.9)}
}

.page { padding: 2rem; font-family: Inter, sans-serif; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
.card {
  background: var(--background);
  border: 1px solid var(--border);
  border-radius: calc(var(--radius) + 4px);
  padding: 1.5rem 1rem;
  display: flex; flex-direction: column; align-items: center; gap: 1rem;
}
.card-label { font-size: 11px; color: var(--muted-foreground); letter-spacing: .04em; text-transform: uppercase; font-weight: 500; }
.snippet {
  background: var(--muted);
  border-radius: var(--radius);
  padding: .25rem .6rem;
  font-family: JetBrains Mono, monospace;
  font-size: 10px;
  color: var(--muted-foreground);
}

/* 1. Classic */
.sp-classic {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2.5px solid var(--border);
  border-top-color: var(--primary);
  animation: spin .7s linear infinite;
}

/* 2. Double ring */
.sp-double { position: relative; width: 36px; height: 36px; }
.sp-double span {
  position: absolute; inset: 0; border-radius: 50%;
  border: 2.5px solid transparent;
  animation: spin 1s ease-in-out infinite;
}
.sp-double span:nth-child(1) { border-top-color: var(--primary); }
.sp-double span:nth-child(2) { border-bottom-color: var(--accent-foreground); inset: 7px; animation-duration: .8s; animation-direction: reverse; }

/* 3. Morph */
.sp-morph {
  width: 32px; height: 32px;
  background: var(--primary);
  animation: morph 2s ease-in-out infinite;
}

/* 4. Ripple */
.sp-ripple { position: relative; width: 40px; height: 40px; }
.sp-ripple span {
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 2px solid var(--primary);
  animation: ripple 1.8s ease-out infinite;
  opacity: 0;
}
.sp-ripple span:nth-child(2) { animation-delay: .6s; }
.sp-ripple span:nth-child(3) { animation-delay: 1.2s; }

/* 5. Bars */
.sp-bars { display: flex; gap: 4px; align-items: center; height: 36px; }
.sp-bars span {
  width: 4px; border-radius: 2px;
  background: var(--primary);
  animation: barWave .9s ease-in-out infinite;
}
.sp-bars span:nth-child(2){animation-delay:.12s}
.sp-bars span:nth-child(3){animation-delay:.24s}
.sp-bars span:nth-child(4){animation-delay:.36s}
.sp-bars span:nth-child(5){animation-delay:.48s}

/* 6. Dots */
.sp-dots { display: flex; gap: 7px; align-items: center; }
.sp-dots span {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--primary);
  animation: dots 1.2s ease-in-out infinite both;
}
.sp-dots span:nth-child(2){animation-delay:.16s}
.sp-dots span:nth-child(3){animation-delay:.32s}

/* 7. SVG dash */
.sp-svg { width: 34px; height: 34px; animation: spin 2s linear infinite; }
.sp-svg circle {
  fill: none; stroke: var(--border); stroke-width: 3;
}
.sp-svg .track-active {
  fill: none; stroke: var(--primary); stroke-width: 3;
  stroke-linecap: round; stroke-dasharray: 113;
  animation: dash 1.5s ease-in-out infinite;
  transform-origin: center;
}

/* 8. Pulse dot */
.sp-pulse {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--primary);
  animation: pulse-scale 1.1s ease-in-out infinite;
}

/* 9. Comet */
.sp-comet { position: relative; width: 38px; height: 38px; animation: spin 1s linear infinite; }
.sp-comet::before {
  content: '';
  position: absolute; top: 3px; left: 50%; margin-left: -5px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--primary);
}
.sp-comet::after {
  content: '';
  position: absolute; inset: 0; border-radius: 50%;
  border: 2px dashed color-mix(in oklch, var(--primary) 30%, transparent);
}

/* 10. Ring gradient faux */
.sp-ring {
  width: 34px; height: 34px; border-radius: 50%;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-right-color: color-mix(in oklch, var(--primary) 60%, var(--border));
  animation: spin .9s linear infinite;
}

/* 11. Segments */
.sp-segments { position: relative; width: 36px; height: 36px; animation: spin .8s steps(8,end) infinite; }
.sp-segments span {
  position: absolute; left: 50%; top: 0;
  width: 3px; height: 9px; border-radius: 2px;
  background: var(--primary);
  transform-origin: 50% 18px;
  opacity: .15;
}
.sp-segments span:nth-child(1){transform:rotate(0deg);opacity:1}
.sp-segments span:nth-child(2){transform:rotate(45deg);opacity:.85}
.sp-segments span:nth-child(3){transform:rotate(90deg);opacity:.65}
.sp-segments span:nth-child(4){transform:rotate(135deg);opacity:.45}
.sp-segments span:nth-child(5){transform:rotate(180deg);opacity:.3}
.sp-segments span:nth-child(6){transform:rotate(225deg);opacity:.2}
.sp-segments span:nth-child(7){transform:rotate(270deg);opacity:.15}
.sp-segments span:nth-child(8){transform:rotate(315deg);opacity:.1}

/* 12. Border spin accent */
.sp-accent {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2.5px solid var(--accent-foreground);
  border-top-color: transparent;
  animation: spin .75s linear infinite;
}
</style>

<div class="page">
  <div class="grid">

    <div class="card">
      <div class="sp-classic"></div>
      <span class="card-label">Classic</span>
      <span class="snippet">sp-classic</span>
    </div>

    <div class="card">
      <div class="sp-double"><span></span><span></span></div>
      <span class="card-label">Double ring</span>
      <span class="snippet">sp-double</span>
    </div>

    <div class="card">
      <div class="sp-morph"></div>
      <span class="card-label">Morph</span>
      <span class="snippet">sp-morph</span>
    </div>

    <div class="card">
      <div class="sp-ripple"><span></span><span></span><span></span></div>
      <span class="card-label">Ripple</span>
      <span class="snippet">sp-ripple</span>
    </div>

    <div class="card">
      <div class="sp-bars"><span></span><span></span><span></span><span></span><span></span></div>
      <span class="card-label">Bars</span>
      <span class="snippet">sp-bars</span>
    </div>

    <div class="card">
      <div class="sp-dots"><span></span><span></span><span></span></div>
      <span class="card-label">Dots</span>
      <span class="snippet">sp-dots</span>
    </div>

    <div class="card">
      <svg class="sp-svg" viewBox="0 0 36 36">
        <circle cx="18" cy="18" r="15"/>
        <circle class="track-active" cx="18" cy="18" r="15"/>
      </svg>
      <span class="card-label">SVG dash</span>
      <span class="snippet">sp-svg</span>
    </div>

    <div class="card">
      <div class="sp-pulse"></div>
      <span class="card-label">Pulse</span>
      <span class="snippet">sp-pulse</span>
    </div>

    <div class="card">
      <div class="sp-comet"></div>
      <span class="card-label">Comet</span>
      <span class="snippet">sp-comet</span>
    </div>

    <div class="card">
      <div class="sp-ring"></div>
      <span class="card-label">Gradient ring</span>
      <span class="snippet">sp-ring</span>
    </div>

    <div class="card">
      <div class="sp-segments">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>
      <span class="card-label">Segments</span>
      <span class="snippet">sp-segments</span>
    </div>

    <div class="card">
      <div class="sp-accent"></div>
      <span class="card-label">Accent</span>
      <span class="snippet">sp-accent</span>
    </div>

  </div>
</div>
